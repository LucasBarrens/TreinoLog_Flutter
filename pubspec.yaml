name: gymlog
description: "GymLog, aplicativo Flutter para registro e acompanhamento de treinos."
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  fl_chart: ^0.63.0
  intl: ^0.19.0
  path_provider: ^2.1.5
  sqflite: ^2.4.0+1
  path: ^1.8.3
  uuid: ^4.0.0
  flutter_riverpod: ^2.4.0
  share_plus: ^10.0.0
  file_picker: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
